name: vt-test

# One-off validation workflow. Generates a tiny benign file and submits it to
# VirusTotal using the same action + secret release.yml uses, to confirm the
# secret is correct and the action invocation works. Runs only on demand via
# workflow_dispatch — does not fire on push.
#
# Delete this file after validating; it's not part of the steady-state CI.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Generate unique benign test files
        run: |
          # Each run produces fresh content so VT doesn't return a cached
          # analysis from a prior run.
          stamp="$(date -u +%Y%m%dT%H%M%SZ)"
          echo "GamerGuardian VT validation test - $stamp" > vt-test-${stamp}.txt
          ls -la vt-test-*.txt

      - name: Submit to VirusTotal
        id: vt
        uses: crazy-max/ghaction-virustotal@936d8c5c00afe97d3d9a1af26d017cfdf26800a2 # v5.0.0
        with:
          vt_api_key: ${{ secrets.VIRUSTOTAL_API_KEY }}
          files: |
            vt-test-*.txt

      - name: Print result
        if: always()
        run: |
          echo "VT step outcome: ${{ steps.vt.outcome }}"
          echo "VT step conclusion: ${{ steps.vt.conclusion }}"
          echo ""
          echo "VT analysis output:"
          echo "${{ steps.vt.outputs.analysis }}"
          if [ -z "${{ steps.vt.outputs.analysis }}" ]; then
            echo "(empty — VT step did not produce an analysis URL)"
          fi
